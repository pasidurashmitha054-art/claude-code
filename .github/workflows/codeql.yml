name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Runs every Monday at 03:17 UTC. Off-the-hour minute avoids piling onto
    # the load spike that hits GitHub Actions runners exactly on the hour.
    - cron: '17 3 * * 1'
  workflow_dispatch: {}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      # required for all workflows
      security-events: write
      # required to fetch internal or private CodeQL packs
      packages: read
      # only required for workflows in private repositories
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Add any extra query packs here, e.g.:
          # queries: security-extended,security-and-quality

      # If build-mode is 'manual' for a compiled language, add your build
      # steps here. For Python with build-mode 'none', no build step is
      # needed — CodeQL analyzes the source directly.
      # - if: matrix.build-mode == 'manual'
      #   run: |
      #     echo 'Add build steps here'
      #     exit 1

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"
